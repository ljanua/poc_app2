components:
  schemas:
    Team:
      type: object
      required: [id, name, ageGroup, leadCoachName, leadCoachEmail]
      properties:
        id:
          type: string
        name:
          type: string
        ageGroup:
          type: string
        leadCoachName:
          type: string
        leadCoachEmail:
          type: string
          format: email
        clubId:
          type: string
          description: Identifier of the club this team belongs to.
        clubName:
          type: string
          description: Display name of the club this team belongs to.
        sportId:
          type: string
          description: >
            Identifier of the sport this team plays. Defaults to "sport_soccer"
            when omitted on create.
        sportName:
          type: string
          description: Display name of the sport this team plays.

    TeamResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Team'

    TeamListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Team'

    CreateTeamRequest:
      type: object
      required: [name, ageGroup]
      properties:
        name:
          type: string
          minLength: 2
        ageGroup:
          type: string
          minLength: 1
        coachEmail:
          type: string
          format: email
          description: Required for SystemAdmin actor; ignored for Coach actor.
        clubId:
          type: string
          description: >
            Required for SystemAdmin actor. For Coach actor, the server resolves
            the coach's first assigned club from coach_clubs when this field is
            omitted.
        sportId:
          type: string
          description: >
            Optional sport identifier. When omitted the server defaults to
            "sport_soccer". Must reference an active row in the sports table.

    UpdateTeamRequest:
      type: object
      required: [coachEmail, clubId, status]
      properties:
        coachEmail:
          type: string
          format: email
        clubId:
          type: string
        status:
          type: string
          enum: [active, inactive]
        sportId:
          type: string
          description: >
            Optional sport identifier. When omitted the server keeps the team's
            current sport. Must reference an active row in the sports table.

    ReassignTeamCoachRequest:
      type: object
      required: [coachEmail]
      properties:
        coachEmail:
          type: string
          format: email

    TeamErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [validation_error, forbidden, not_found, conflict]
        message:
          type: string