components:
  schemas:
    Player:
      type: object
      required: [id, name, normalizedName, teamName, position, trend, updated]
      properties:
        id:
          type: integer
        name:
          type: string
        normalizedName:
          type: string
        teamName:
          type: string
        position:
          type: string
        trend:
          type: string
          enum: [improving, plateau, declining]
        birthMonth:
          type: integer
          nullable: true
          minimum: 1
          maximum: 12
          description: >-
            Month of the player's birth (1=January, 12=December). Always
            paired with birthYear when set; the API rejects partial pairs.
        birthYear:
          type: integer
          nullable: true
          minimum: 1960
          maximum: 2100
          description: >-
            Year of the player's birth. Always paired with birthMonth when
            set; the API rejects partial pairs. Upper bound is the current
            calendar year.
        age:
          type: integer
          nullable: true
          readOnly: true
          description: >-
            Auto-calculated from birthMonth and birthYear at read time.
            Null when either birth field is missing. The value reflects the
            player's age as of the current date, not the value at the time
            the row was last written.
        updated:
          type: string
        avatarUrl:
          type: string
          nullable: true
          description: >-
            URL or data-URI of the player's avatar image. Always 100x100 JPEG.
            Null when no avatar has been uploaded.

    PlayerResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Player'

    PlayerListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Player'

    PreviewCreateResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [normalizedName, teamName]
          properties:
            normalizedName:
              type: string
            teamName:
              type: string
            duplicatePlayer:
              allOf:
                - $ref: '#/components/schemas/Player'
              nullable: true

    CreatePlayerRequest:
      type: object
      required: [name, teamName]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 60
        teamName:
          type: string
        position:
          type: string
        birthMonth:
          type: integer
          nullable: true
          minimum: 1
          maximum: 12
          description: >-
            Month of birth. Must be paired with birthYear (both set, or both
            omitted/null). The server returns 400 if only one is provided.
        birthYear:
          type: integer
          nullable: true
          minimum: 1960
          maximum: 2100
          description: >-
            Year of birth. Must be paired with birthMonth (both set, or both
            omitted/null). The server returns 400 if only one is provided.
        confirmCreate:
          type: boolean

    AssignPlayerRequest:
      type: object
      required: [teamName]
      properties:
        teamName:
          type: string

    CreateOrAssignResponse:
      type: object
      required: [status, code, message, player]
      properties:
        status:
          type: integer
        code:
          type: string
          enum: [ok, created]
        moved:
          type: boolean
        message:
          type: string
        player:
          $ref: '#/components/schemas/Player'

    DuplicateConflictResponse:
      type: object
      required: [status, code, message, duplicatePlayer]
      properties:
        status:
          type: integer
          enum: [409]
        code:
          type: string
          enum: [conflict]
        message:
          type: string
        duplicatePlayer:
          $ref: '#/components/schemas/Player'

    PlayerErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [validation_error, forbidden, not_found, conflict]
        message:
          type: string

    MetricChangeIndicator:
      type: object
      required: [label, trend]
      properties:
        label:
          type: string
        trend:
          type: string
          enum: [improving, plateau, declining]

    PlayerDashboardStats:
      type: object
      required: [growthStatus, currentLevel, fitness, skillProgress, totalMinutes, appearances, recentAvg, trend, clipSubmittedCount, clipAssessedCount, clipPendingCount]
      properties:
        growthStatus:
          type: string
          enum: [on_track, watch, at_risk]
        currentLevel:
          type: string
        fitness:
          type: string
        skillProgress:
          type: string
        totalMinutes:
          type: integer
        appearances:
          type: integer
        recentAvg:
          type: string
        averageScore:
          type: number
          nullable: true
        trend:
          type: string
          enum: [improving, plateau, declining]
        lastMatchScore:
          type: number
          nullable: true
        lastMatchSummary:
          type: string
          nullable: true
        clipSubmittedCount:
          type: integer
        clipAssessedCount:
          type: integer
        clipPendingCount:
          type: integer
        missingDataMessage:
          type: string
          nullable: true
          description: >-
            Set whenever this player has no genuinely recorded stats yet
            (e.g. a newly added player with no matches or assessed clips).
            This is the authoritative signal that every stat-derived field on
            this response is a placeholder ("N/A" or zero) rather than real
            data -- consumers should treat the player as having no
            development, match-time, or performance history to display, not
            just a note limited to recent-performance context.
        currentLevelChange:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/MetricChangeIndicator'
        fitnessChange:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/MetricChangeIndicator'
        skillProgressChange:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/MetricChangeIndicator'

    PlayerSkillRating:
      type: object
      required: [skillId, skillName, positionId, positionName]
      properties:
        skillId:
          type: string
        skillName:
          type: string
          description: >
            Convenience denormalization of the skill's name so callers don't
            need a second round-trip to render the Skill Ratings table.
        positionId:
          type: string
        positionName:
          type: string
          description: >
            Catalog position that owns this skill in the returned list
            (Any Position for baseline skills, or the player's role for
            role-unique skills). Overlaps appear only under Any Position.
        rating:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
          description: >
            Skill level from 0 to 100 inclusive. Null means "not yet rated"
            (distinct from a deliberate 0%).

    UpdatePlayerSkillRatingsRequest:
      type: object
      required: [ratings]
      properties:
        ratings:
          type: array
          items:
            type: object
            required: [skillId]
            properties:
              skillId:
                type: string
              rating:
                type: integer
                nullable: true
                minimum: 0
                maximum: 100
                description: >
                  Integer 0–100, or null to clear the rating. Floats are rejected.

    PlayerSkillRatingsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [skillRatings]
          properties:
            skillRatings:
              type: array
              items:
                $ref: '#/components/schemas/PlayerSkillRating'

    PlayerDashboardResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [player, stats, metrics, matchTime, performance, clipStats, skillRatings]
          properties:
            player:
              $ref: '#/components/schemas/Player'
            stats:
              $ref: '#/components/schemas/PlayerDashboardStats'
            skillRatings:
              type: array
              items:
                $ref: '#/components/schemas/PlayerSkillRating'
              description: >
                Union of the sport's Any Position skills plus role-unique skills
                for the player's assigned position (overlaps listed only under
                Any Position). Empty when the player has no team/sport or the
                sport has no Any Position catalog row.
            metrics:
              type: object
              required: [currentLevel, fitness, skillProgress]
              properties:
                currentLevel:
                  type: string
                fitness:
                  type: string
                skillProgress:
                  type: string
                currentLevelChange:
                  nullable: true
                  allOf:
                    - $ref: '#/components/schemas/MetricChangeIndicator'
                fitnessChange:
                  nullable: true
                  allOf:
                    - $ref: '#/components/schemas/MetricChangeIndicator'
                skillProgressChange:
                  nullable: true
                  allOf:
                    - $ref: '#/components/schemas/MetricChangeIndicator'
            matchTime:
              type: object
              required: [totalMinutes, appearances, recentAvg]
              properties:
                totalMinutes:
                  type: integer
                appearances:
                  type: integer
                recentAvg:
                  type: string
            performance:
              type: object
              required: [averageScore, trend, lastMatchScore]
              properties:
                averageScore:
                  type: string
                trend:
                  type: string
                  enum: [improving, plateau, declining]
                lastMatchScore:
                  type: string
                lastMatchSummary:
                  type: string
                  nullable: true
                missingDataMessage:
                  type: string
                  nullable: true
                  description: >-
                    See PlayerDashboardStats.missingDataMessage -- the same
                    authoritative "no real stats yet" signal, mirrored here
                    for consumers that only read the performance object.
            clipStats:
              type: object
              required: [submitted, assessed, pending]
              properties:
                submitted:
                  type: integer
                assessed:
                  type: integer
                pending:
                  type: integer

    PlayerProfileResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [player, stats, skillRatings]
          properties:
            player:
              $ref: '#/components/schemas/Player'
            stats:
              $ref: '#/components/schemas/PlayerDashboardStats'
            skillRatings:
              type: array
              items:
                $ref: '#/components/schemas/PlayerSkillRating'
              description: >
                Union of the sport's Any Position skills plus role-unique skills
                for the player's assigned position (overlaps listed only under
                Any Position). Empty when the player has no team/sport or the
                sport has no Any Position catalog row.

    UpdatePlayerProfileRequest:
      type: object
      description: >-
        Full coach-editable player profile. Identity fields update the
        players/assignment records; the remaining fields update player_stats.
        A successful update always clears missingDataMessage so the S2
        dashboard leaves the "no stats yet" state. Clip counts
        (clipSubmittedCount/clipAssessedCount/clipPendingCount) are a
        coach-editable write-through cache and are intentionally not
        reconciled against the clips table.
      required: [name, teamName, position, trend]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 60
        teamName:
          type: string
        position:
          type: string
        birthMonth:
          type: integer
          nullable: true
          minimum: 1
          maximum: 12
          description: >-
            Month of birth. Send together with birthYear (or omit/null both)
            to record or clear the player's birth date. Sending only one of
            the two fields returns 400 validation_error.
        birthYear:
          type: integer
          nullable: true
          minimum: 1960
          maximum: 2100
          description: >-
            Year of birth. Send together with birthMonth (or omit/null both)
            to record or clear the player's birth date. Sending only one of
            the two fields returns 400 validation_error.
        trend:
          type: string
          enum: [improving, plateau, declining]
        avatarUrl:
          type: string
          nullable: true
          description: >-
            URL or data-URI for the player's avatar. When set, the image
            replaces the default player icon across all surfaces. Stored as a
            100x100 JPEG.
        growthStatus:
          type: string
          nullable: true
          enum: [on_track, watch, at_risk, null]
        currentLevel:
          type: string
          nullable: true
        fitness:
          type: string
          nullable: true
        skillProgress:
          type: string
          nullable: true
        totalMinutes:
          type: integer
        appearances:
          type: integer
        recentAvg:
          type: string
          nullable: true
        averageScore:
          type: number
          nullable: true
        lastMatchScore:
          type: number
          nullable: true
        lastMatchSummary:
          type: string
          nullable: true
        clipSubmittedCount:
          type: integer
        clipAssessedCount:
          type: integer
        clipPendingCount:
          type: integer
        currentLevelChange:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/MetricChangeIndicator'
        fitnessChange:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/MetricChangeIndicator'
        skillProgressChange:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/MetricChangeIndicator'
