components:
  schemas:
    Player:
      type: object
      required: [id, name, normalizedName, teamName, position, trend, updated]
      properties:
        id:
          type: integer
        name:
          type: string
        normalizedName:
          type: string
        teamName:
          type: string
        position:
          type: string
        trend:
          type: string
          enum: [improving, plateau, declining]
        updated:
          type: string

    PlayerResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Player'

    PlayerListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Player'

    PreviewCreateResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [normalizedName, teamName]
          properties:
            normalizedName:
              type: string
            teamName:
              type: string
            duplicatePlayer:
              allOf:
                - $ref: '#/components/schemas/Player'
              nullable: true

    CreatePlayerRequest:
      type: object
      required: [name, teamName]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 60
        teamName:
          type: string
        confirmCreate:
          type: boolean

    AssignPlayerRequest:
      type: object
      required: [teamName]
      properties:
        teamName:
          type: string

    CreateOrAssignResponse:
      type: object
      required: [status, code, message, player]
      properties:
        status:
          type: integer
        code:
          type: string
          enum: [ok, created]
        moved:
          type: boolean
        message:
          type: string
        player:
          $ref: '#/components/schemas/Player'

    DuplicateConflictResponse:
      type: object
      required: [status, code, message, duplicatePlayer]
      properties:
        status:
          type: integer
          enum: [409]
        code:
          type: string
          enum: [conflict]
        message:
          type: string
        duplicatePlayer:
          $ref: '#/components/schemas/Player'

    PlayerErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [validation_error, forbidden, not_found, conflict]
        message:
          type: string

    MetricChangeIndicator:
      type: object
      required: [label, trend]
      properties:
        label:
          type: string
        trend:
          type: string
          enum: [improving, plateau, declining]

    PlayerDashboardStats:
      type: object
      required: [growthStatus, currentLevel, fitness, skillProgress, totalMinutes, appearances, recentAvg, trend, clipSubmittedCount, clipAssessedCount, clipPendingCount]
      properties:
        growthStatus:
          type: string
          enum: [on_track, watch, at_risk]
        currentLevel:
          type: string
        fitness:
          type: string
        skillProgress:
          type: string
        totalMinutes:
          type: integer
        appearances:
          type: integer
        recentAvg:
          type: string
        averageScore:
          type: number
          nullable: true
        trend:
          type: string
          enum: [improving, plateau, declining]
        lastMatchScore:
          type: number
          nullable: true
        lastMatchSummary:
          type: string
          nullable: true
        clipSubmittedCount:
          type: integer
        clipAssessedCount:
          type: integer
        clipPendingCount:
          type: integer
        missingDataMessage:
          type: string
          nullable: true
          description: >-
            Set whenever this player has no genuinely recorded stats yet
            (e.g. a newly added player with no matches or assessed clips).
            This is the authoritative signal that every stat-derived field on
            this response is a placeholder ("N/A" or zero) rather than real
            data -- consumers should treat the player as having no
            development, match-time, or performance history to display, not
            just a note limited to recent-performance context.
        currentLevelChange:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/MetricChangeIndicator'
        fitnessChange:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/MetricChangeIndicator'
        skillProgressChange:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/MetricChangeIndicator'

    PlayerDashboardResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [player, stats, metrics, matchTime, performance, clipStats]
          properties:
            player:
              $ref: '#/components/schemas/Player'
            stats:
              $ref: '#/components/schemas/PlayerDashboardStats'
            metrics:
              type: object
              required: [currentLevel, fitness, skillProgress]
              properties:
                currentLevel:
                  type: string
                fitness:
                  type: string
                skillProgress:
                  type: string
                currentLevelChange:
                  nullable: true
                  allOf:
                    - $ref: '#/components/schemas/MetricChangeIndicator'
                fitnessChange:
                  nullable: true
                  allOf:
                    - $ref: '#/components/schemas/MetricChangeIndicator'
                skillProgressChange:
                  nullable: true
                  allOf:
                    - $ref: '#/components/schemas/MetricChangeIndicator'
            matchTime:
              type: object
              required: [totalMinutes, appearances, recentAvg]
              properties:
                totalMinutes:
                  type: integer
                appearances:
                  type: integer
                recentAvg:
                  type: string
            performance:
              type: object
              required: [averageScore, trend, lastMatchScore]
              properties:
                averageScore:
                  type: string
                trend:
                  type: string
                  enum: [improving, plateau, declining]
                lastMatchScore:
                  type: string
                lastMatchSummary:
                  type: string
                  nullable: true
                missingDataMessage:
                  type: string
                  nullable: true
                  description: >-
                    See PlayerDashboardStats.missingDataMessage -- the same
                    authoritative "no real stats yet" signal, mirrored here
                    for consumers that only read the performance object.
            clipStats:
              type: object
              required: [submitted, assessed, pending]
              properties:
                submitted:
                  type: integer
                assessed:
                  type: integer
                pending:
                  type: integer
