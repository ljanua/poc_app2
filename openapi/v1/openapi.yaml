openapi: 3.0.3
info:
  title: VantageIQ API
  version: 1.0.0
  description: Phase-1 API contract including SystemAdmin user lifecycle operations.
servers:
  - url: /v1
paths:
  /players:
    get:
      summary: List players
      tags: [Players]
      security:
        - bearerAuth: []
      parameters:
        - name: teamName
          in: query
          required: false
          schema:
            type: string
        - name: query
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Player list
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerListResponse'
    post:
      summary: Create player or assign existing
      tags: [Players]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/players.yaml#/components/schemas/CreatePlayerRequest'
      responses:
        '200':
          description: Assigned existing player
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/CreateOrAssignResponse'
        '201':
          description: Player created and assigned
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/CreateOrAssignResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'
        '409':
          description: Duplicate conflict
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/DuplicateConflictResponse'

  /players/preview-create:
    post:
      summary: Preview no-match create payload and duplicate check
      tags: [Players]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/players.yaml#/components/schemas/CreatePlayerRequest'
      responses:
        '200':
          description: Preview create payload
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PreviewCreateResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'

  /players/{playerId}:
    get:
      summary: Get player by id
      tags: [Players]
      security:
        - bearerAuth: []
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Player detail
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'
    patch:
      summary: Update full player profile (identity + stats)
      description: >-
        Coach-only. Updates identity, team assignment, and player_stats in a
        single transaction and clears missingDataMessage on success.
      tags: [Players]
      security:
        - bearerAuth: []
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
        - name: actorEmail
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/players.yaml#/components/schemas/UpdatePlayerProfileRequest'
      responses:
        '200':
          description: Updated player profile
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerProfileResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'
        '409':
          description: Duplicate conflict
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'

  /players/{playerId}/profile:
    get:
      summary: Get full editable player profile (identity + stats)
      description: Coach-only. Returns the player identity and full stats for editing.
      tags: [Players]
      security:
        - bearerAuth: []
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
        - name: actorEmail
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Player profile
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerProfileResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'

  /players/dashboard:
    get:
      summary: Get player development dashboard
      tags: [Players]
      security:
        - bearerAuth: []
      parameters:
        - name: playerName
          in: query
          required: false
          schema:
            type: string
        - name: actorEmail
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerDashboardResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'

  /players/{playerId}/assign:
    post:
      summary: Assign existing player to team (strict move)
      tags: [Players]
      security:
        - bearerAuth: []
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/players.yaml#/components/schemas/AssignPlayerRequest'
      responses:
        '200':
          description: Assigned or no-op assignment
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/CreateOrAssignResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'

  /users:
    get:
      summary: List users
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/UserListResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'
    post:
      summary: Create user
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/users.yaml#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/UserResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'
  /users/{userId}/role:
    patch:
      summary: Change user role
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/users.yaml#/components/schemas/ChangeRoleRequest'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/UserResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'
  /users/{userId}/password:
    patch:
      summary: Change user password
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/users.yaml#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password updated
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'

  /teams:
    get:
      summary: List teams
      tags: [Teams]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Team list
          content:
            application/json:
              schema:
                $ref: './schemas/teams.yaml#/components/schemas/TeamListResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/teams.yaml#/components/schemas/TeamErrorResponse'
    post:
      summary: Create team
      tags: [Teams]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/teams.yaml#/components/schemas/CreateTeamRequest'
      responses:
        '201':
          description: Team created
          content:
            application/json:
              schema:
                $ref: './schemas/teams.yaml#/components/schemas/TeamResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/teams.yaml#/components/schemas/TeamErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/teams.yaml#/components/schemas/TeamErrorResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: './schemas/teams.yaml#/components/schemas/TeamErrorResponse'

  /teams/{teamId}/coach:
    patch:
      summary: Reassign team coach
      tags: [Teams]
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/teams.yaml#/components/schemas/ReassignTeamCoachRequest'
      responses:
        '200':
          description: Team coach updated
          content:
            application/json:
              schema:
                $ref: './schemas/teams.yaml#/components/schemas/TeamResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/teams.yaml#/components/schemas/TeamErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/teams.yaml#/components/schemas/TeamErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/teams.yaml#/components/schemas/TeamErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
