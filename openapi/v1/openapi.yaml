          type: string
    patch:
      summary: Update position (rename or move sport)
      description: >
        SystemAdmin-only. Updates the position's display name and/or moves
        it to a different sport. Returns 409 when the new (sport_id, name)
        pair collides with an existing position.
      tags: [Skills]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
