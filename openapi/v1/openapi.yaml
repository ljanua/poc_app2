  /sports/{sportId}/status:
    parameters:
      - name: sportId
        in: path
        required: true
        schema:
          type: string
    patch:
      summary: Set sport lifecycle status
      description: >
        SystemAdmin-only. Flips the sport between `active` and `inactive`.
        Deactivating a sport does NOT cascade-deactivate its positions or
        skill assignments; join rows are preserved so reactivate is a no-op.
      tags: [Skills]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/skills.yaml#/components/schemas/SportStatusRequest'
      responses:
        '200':
          description: Sport status updated
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SportResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'

  /positions:
    get:
      summary: List positions
      description: >
        SystemAdmin-only. Returns positions filtered by `sportId` (default
