      tags: [Skills]
      security:
        - bearerAuth: []
      parameters:
        - name: actorEmail
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, inactive, all]
      responses:
        '200':
          description: Skill list
          content:
            application/json:
              schema:
