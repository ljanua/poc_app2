      description: >
        SystemAdmin-only. Flips the position between `active` and
        `inactive`. Deactivating a position does NOT cascade-detach its skill
        assignments.
      tags: [Skills]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/skills.yaml#/components/schemas/PositionStatusRequest'
      responses:
        '200':
          description: Position status updated
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/PositionResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
