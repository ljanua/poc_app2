            schema:
              $ref: './schemas/skills.yaml#/components/schemas/UpdatePositionRequest'
      responses:
        '200':
          description: Position updated
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/PositionResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
