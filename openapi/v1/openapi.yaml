        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
        '409':
          description: Conflict (duplicate name)
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
    delete:
      summary: Delete skill
      description: >
        SystemAdmin-only. Hard-deletes the skill row. Returns 409 when the
        skill has any `position_skills` assignments — admin must remove the
        assignments first.
      tags: [Skills]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Skill deleted
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
        '409':
          description: Conflict (skill has assignments)
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'

  /positions/{positionId}/skills:
    parameters:
      - name: positionId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: List skills assigned to a position
      description: >
        SystemAdmin-only. Returns the position's skill assignments joined with
        each skill's display name and current status.
      tags: [Skills]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Position skill list
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/PositionSkillListResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
        '404':
          description: Position not found
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
    post:
      summary: Assign a skill to a position (additive)
      description: >
        SystemAdmin-only. Idempotent insert of a `position_skills(position_id,
        skill_id)` row. Returns 201 on first add and 200 when the row already
        exists (mirroring the S7a user-club contract). Both position and skill
        must be active.
      tags: [Skills]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/skills.yaml#/components/schemas/AssignSkillToPositionRequest'
      responses:
        '200':
          description: Skill already assigned (idempotent)
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/PositionSkillListResponse'
        '201':
          description: Skill assigned
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/PositionSkillListResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
        '404':
          description: Position or skill not found
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'

  /positions/{positionId}/skills/{skillId}:
    parameters:
      - name: positionId
        in: path
        required: true
        schema:
          type: string
      - name: skillId
        in: path
        required: true
        schema:
          type: string
    delete:
      summary: Remove a skill from a position
      description: >
        SystemAdmin-only. Deletes the matching `position_skills` row. Returns
        204 on success and 404 if the row didn't exist (not idempotent; caller
        must distinguish "detached" from "wasn't there").
      tags: [Skills]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Assignment removed
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
        '404':
          description: Assignment not found
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
