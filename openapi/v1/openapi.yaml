        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
    post:
      summary: Create skill
      description: >
        SystemAdmin-only. Creates a new skill with `status = 'active'`.
