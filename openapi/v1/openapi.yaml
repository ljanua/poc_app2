openapi: 3.0.3
info:
  title: VantageIQ API
  version: 1.0.0
  description: Phase-1 API contract including SystemAdmin user lifecycle operations.
servers:
  - url: /v1
paths:
  /players:
    get:
      summary: List players
      description: >-
        Returns the player roster. When `actorEmail` resolves to an active
        Coach, the result is scoped to players whose team belongs to one of
        the coach's clubs (joined via `coach_clubs`); SystemAdmin actors and
        unknown/missing actors receive the full roster regardless of
        `onlyMine`. `onlyMine` is layered on top of role scoping and is
        accepted for API completeness but never affects a SystemAdmin
        response.
      tags: [Players]
      security:
        - bearerAuth: []
      parameters:
        - name: teamName
          in: query
          required: false
          schema:
            type: string
        - name: query
          in: query
          required: false
          schema:
            type: string
        - name: actorEmail
          in: query
          required: false
          description: >-
            Email of the requesting user. When the resolved user is an
            active Coach, the response is scoped to that coach's clubs.
          schema:
            type: string
        - name: onlyMine
          in: query
          required: false
          description: >-
            When true, narrows the response to players whose team belongs
            to one of the actor's clubs. Has no effect for SystemAdmin
            actors (they always see the full roster).
          schema:
            type: boolean
      responses:
        '200':
          description: Player list
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerListResponse'
    post:
      summary: Create player or assign existing
      tags: [Players]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/players.yaml#/components/schemas/CreatePlayerRequest'
      responses:
        '200':
          description: Assigned existing player
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/CreateOrAssignResponse'
        '201':
          description: Player created and assigned
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/CreateOrAssignResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'
        '409':
          description: Duplicate conflict
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/DuplicateConflictResponse'

  /players/preview-create:
    post:
      summary: Preview no-match create payload and duplicate check
      tags: [Players]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/players.yaml#/components/schemas/CreatePlayerRequest'
      responses:
        '200':
          description: Preview create payload
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PreviewCreateResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'

  /players/{playerId}:
    get:
      summary: Get player by id
      tags: [Players]
      security:
        - bearerAuth: []
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Player detail
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'
    patch:
      summary: Update full player profile (identity + stats)
      description: >-
        Coach-only. Updates identity, team assignment, and player_stats in a
        single transaction and clears missingDataMessage on success.
      tags: [Players]
      security:
        - bearerAuth: []
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
        - name: actorEmail
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/players.yaml#/components/schemas/UpdatePlayerProfileRequest'
      responses:
        '200':
          description: Updated player profile
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerProfileResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'
        '409':
          description: Duplicate conflict
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'

  /players/{playerId}/skill-ratings:
    put:
      summary: Update player skill ratings for the current position
      description: >-
        Coach-only. Partial replace of skill ratings for skills assigned to the
        player's current position. Skills not listed in the request are left
        untouched. Sending rating: null clears that skill's rating. Skills
        outside the player's current position_skills set return 400
        validation_error with message
        "Skill '<name>' is not tracked for the player's position '<position>'.
        Add it to the position in Manage Skills (S8) or change the player's
        position."
      tags: [Players]
      security:
        - bearerAuth: []
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
        - name: actorEmail
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/players.yaml#/components/schemas/UpdatePlayerSkillRatingsRequest'
            examples:
              updateRatings:
                $ref: './examples/player-skill-ratings-update-request.json'
      responses:
        '200':
          description: Updated skill ratings for the player's current position
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerSkillRatingsResponse'
              examples:
                list:
                  $ref: './examples/player-skill-ratings-list.json'
        '400':
          description: Validation error (out of range, float, or skill out of position)
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'
              examples:
                skillOutOfPosition:
                  $ref: './examples/player-skill-ratings-skill-out-of-position.json'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'

  /players/{playerId}/profile:
    get:
      summary: Get full editable player profile (identity + stats)
      description: Coach-only. Returns the player identity and full stats for editing.
      tags: [Players]
      security:
        - bearerAuth: []
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: string
        - name: actorEmail
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Player profile
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerProfileResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'

  /players/dashboard:
    get:
      summary: Get player development dashboard
      tags: [Players]
      security:
        - bearerAuth: []
      parameters:
        - name: playerName
          in: query
          required: false
          schema:
            type: string
        - name: actorEmail
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerDashboardResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'

  /players/{playerId}/assign:
    post:
      summary: Assign existing player to team (strict move)
      tags: [Players]
      security:
        - bearerAuth: []
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/players.yaml#/components/schemas/AssignPlayerRequest'
      responses:
        '200':
          description: Assigned or no-op assignment
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/CreateOrAssignResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/players.yaml#/components/schemas/PlayerErrorResponse'

  /users:
    get:
      summary: List users
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/UserListResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'
    post:
      summary: Create user
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/users.yaml#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/UserResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'
  /users/{userId}/role:
    patch:
      summary: Change user role
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/users.yaml#/components/schemas/ChangeRoleRequest'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/UserResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'
  /users/{userId}/password:
    patch:
      summary: Change user password
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/users.yaml#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password updated
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/users.yaml#/components/schemas/ErrorResponse'

  /teams:
    get:
      summary: List teams
      description: >
        Returns the team list, optionally filtered by club and scoped to the
        calling coach's assigned clubs when `actorEmail` is provided and the
        actor is a Coach.
      tags: [Teams]
      security:
        - bearerAuth: []
      parameters:
        - name: clubId
          in: query
          required: false
          schema:
            type: string
          description: Restrict the result to a single club.
        - name: actorEmail
          in: query
          required: false
          schema:
            type: string
          description: >
            Coach actor identity. When present and the user is an active Coach,
            only teams in their assigned clubs are returned.
      responses:
        '200':
          description: Team list
          content:
            application/json:
              schema:
                $ref: './schemas/teams.yaml#/components/schemas/TeamListResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/teams.yaml#/components/schemas/TeamErrorResponse'
    post:
      summary: Create team
      tags: [Teams]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/teams.yaml#/components/schemas/CreateTeamRequest'
      responses:
        '201':
          description: Team created
          content:
            application/json:
              schema:
                $ref: './schemas/teams.yaml#/components/schemas/TeamResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/teams.yaml#/components/schemas/TeamErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/teams.yaml#/components/schemas/TeamErrorResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: './schemas/teams.yaml#/components/schemas/TeamErrorResponse'

  /clubs:
    get:
      summary: List clubs
      description: >
        Returns the clubs the caller is allowed to see. SystemAdmin sees every
        club by default; Coach sees only the clubs they are assigned to via
        coach_clubs. By default, only `status = 'active'` clubs are returned
        for both roles; pass `?status=inactive` or `?status=all` to override.
      tags: [Clubs]
      security:
        - bearerAuth: []
      parameters:
        - name: actorEmail
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, inactive, all]
          description: >
            Filter by lifecycle status. Defaults to `active` for both roles
            so deactivated clubs are hidden from new team-create pickers.
      responses:
        '200':
          description: Club list
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubListResponse'
    post:
      summary: Create club
      description: >
        SystemAdmin-only. Creates a new club with `status = 'active'`.
        Returns 409 when the name collides with an existing club.
      tags: [Clubs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/clubs.yaml#/components/schemas/CreateClubRequest'
      responses:
        '201':
          description: Club created
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'
        '409':
          description: Conflict (duplicate name)
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'

  /clubs/{clubId}:
    parameters:
      - name: clubId
        in: path
        required: true
        schema:
          type: string
    patch:
      summary: Update club (rename)
      description: >
        SystemAdmin-only. Updates the club's display name. Returns 409 when
        the new name collides with another club.
      tags: [Clubs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/clubs.yaml#/components/schemas/UpdateClubRequest'
      responses:
        '200':
          description: Club updated
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'
        '409':
          description: Conflict (duplicate name)
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'

  /clubs/{clubId}/status:
    parameters:
      - name: clubId
        in: path
        required: true
        schema:
          type: string
    patch:
      summary: Set club lifecycle status
      description: >
        SystemAdmin-only. Flips the club between `active` and `inactive`.
        Deactivating a club does NOT cascade-detach its teams or coaches;
        the join rows are preserved so reactivate is a no-op for them.
      tags: [Clubs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/clubs.yaml#/components/schemas/ClubStatusRequest'
      responses:
        '200':
          description: Club status updated
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'

  /clubs/{clubId}/coaches:
    parameters:
      - name: clubId
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Assign a user to a club (additive coach_clubs insert)
      description: >
        SystemAdmin-only. Idempotent insert of a `coach_clubs(user_id, club_id)`
        row. Returns 400 if the user is inactive or the club is inactive; both
        are preconditions for membership eligibility. The endpoint is
        non-removal: the per-user `×` chip on the S7 inline badge list calls
        `DELETE /v1/users/{userId}/clubs/{clubId}` instead.
      tags: [Clubs, Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/clubs.yaml#/components/schemas/AssignCoachToClubRequest'
      responses:
        '201':
          description: User assigned to club (or already a member, idempotent)
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/UserClubAssignResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'
        '404':
          description: User or club not found
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'

  /clubs/{clubId}/teams:
    parameters:
      - name: clubId
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Move a team into this club
      description: >
        SystemAdmin-only. Thin wrapper over `POST /v1/teams/{teamId}/update`
        that re-asserts the team's current coach and status while changing
        only `clubId`. The wrapper keeps the S7a Assign Teams picker
        self-contained; the actual mutation is atomic and goes through the
        team-update transaction.
      tags: [Clubs, Teams]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/clubs.yaml#/components/schemas/AssignTeamToClubRequest'
      responses:
        '200':
          description: Team moved
          content:
            application/json:
              schema:
                $ref: './schemas/teams.yaml#/components/schemas/TeamResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'
        '404':
          description: Team or club not found
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'

  /users/{userId}/clubs:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: List a user's club memberships
      description: >
        SystemAdmin-only. Returns every `coach_clubs` row for the user,
        joined with the club's display name and current status.
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User's club memberships
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/UserClubListResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'
    post:
      summary: Assign user to a club (additive)
      description: >
        SystemAdmin-only. Idempotent insert of a `coach_clubs(user_id, club_id)`
        row for the user. Same preconditions as
        `POST /v1/clubs/{clubId}/coaches`: target user must be active, target
        club must be active. 200 is returned when the row already exists so
        callers can safely retry without a "conflict" branch.
      tags: [Users, Clubs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/clubs.yaml#/components/schemas/AssignUserClubRequest'
      responses:
        '200':
          description: Already a member (idempotent)
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/UserClubAssignResponse'
        '201':
          description: User assigned to club
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/UserClubAssignResponse'
        '400':
          description: Validation error (user or club inactive)
          content:
            application/json:
              schema:
                $ref: './schemas/clubs.yaml#/components/schemas/ClubErrorResponse'
        '403':
          description: Forbidden
