      tags: [Skills]
      security:
        - bearerAuth: []
      parameters:
        - name: sportId
          in: query
          required: false
          schema:
            type: string
          description: Restrict to a single sport. Defaults to `sport_soccer`.
        - name: actorEmail
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, inactive, all]
      responses:
        '200':
          description: Position list
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/PositionListResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
    post:
      summary: Create position
      description: >
        SystemAdmin-only. Creates a new position under the supplied sport
        with `status = 'active'`. Returns 409 when the (sport_id, name) pair
        collides with an existing position.
      tags: [Skills]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/skills.yaml#/components/schemas/CreatePositionRequest'
      responses:
        '201':
          description: Position created
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/PositionResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
        '404':
          description: Sport not found
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
        '409':
          description: Conflict (duplicate name within sport)
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'

  /positions/{positionId}:
