        insensitive).
      tags: [Skills]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/skills.yaml#/components/schemas/CreateSkillRequest'
      responses:
        '201':
          description: Skill created
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './schemas/skills.yaml#/components/schemas/SkillErrorResponse'
        '403':
          description: Forbidden
          content:
