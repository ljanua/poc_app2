<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>S6: Assessment Results — VantageIQ</title>
  <link rel="stylesheet" href="./style/site.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-title">Video Assessments</div>
      <div class="header-meta" id="assessmentHeaderMeta">4 submitted • 3 assessed</div>
      <div class="header-meta" id="roleMeta">Coach</div>
      <button class="exit-btn" type="button" data-testid="exit-button" aria-label="Log out" title="Log out">✕</button>
    </header>

    <div class="content">
      <div class="toolbar assessment-toolbar">
        <select class="pill-select" id="teamFilter" aria-label="Filter clips by team">
          <option value="all">All Teams</option>
        </select>
        <label class="preselected-player" id="preselectedPlayerLabel" hidden>
          <input type="checkbox" id="preselectedPlayerFilter" data-testid="preselected-player-filter">
          <span id="preselectedPlayerText">Pre-Selected Player</span>
        </label>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-status="all">All</button>
        <button class="filter-btn" data-status="assessed">Assessed</button>
        <button class="filter-btn" data-status="pending">Pending</button>
        <button class="filter-btn" data-status="failed">Failed</button>
      </div>

      <div class="results-grid" id="resultsGrid">
        <div class="notice">Loading clip results...</div>
      </div>
    </div>

    <nav class="bottom-nav">
      <a class="nav-item" href="./S1-player-list.html">
        <span class="nav-icon">👥</span>
        <span>Players</span>
      </a>
      <a class="nav-item" href="./S3-team-management.html">
        <span class="nav-icon">🧩</span>
        <span>Teams</span>
      </a>
      <a class="nav-item" href="./S10-games.html" data-testid="nav-games">
        <span class="nav-icon">???</span>
        <span>Games</span>
      </a>
      <a class="nav-item" href="./S4-video-capture.html">
        <span class="nav-icon">📹</span>
        <span>Capture</span>
      </a>
      <a class="nav-item active" href="./S6-assessment-list.html">
        <span class="nav-icon">📊</span>
        <span>My Clips</span>
      </a>
      <a class="nav-item" href="./S7-admin-user-management.html" data-role-visible-to="SystemAdmin,ClubAdmin" data-testid="nav-users" hidden>
        <span class="nav-icon">🛡️</span>
        <span>Users</span>
      </a>
      <a class="nav-item" href="./S7a-clubs.html" data-role-visible-to="SystemAdmin" data-testid="nav-clubs" hidden>
        <span class="nav-icon">🏛️</span>
        <span>Clubs</span>
      </a>
      <a class="nav-item" href="./S8-skills.html" data-role-visible-to="SystemAdmin" data-testid="nav-skills" hidden>
        <span class="nav-icon">🧠</span>
        <span>Skills</span>
      </a>
    </nav>
  </div>

  <div class="modal" id="clipPlayerModal" data-testid="clip-player-modal" aria-hidden="true">
    <div class="modal-panel clip-player-panel" role="dialog" aria-modal="true" aria-labelledby="clipPlayerTitle">
      <div class="modal-header">
        <h2 id="clipPlayerTitle">Clip playback</h2>
        <button type="button" class="exit-btn" id="clipPlayerClose" data-testid="clip-player-close" aria-label="Close player">✕</button>
      </div>
      <p id="clipPlayerUnavailable" class="notice" data-testid="clip-player-unavailable" hidden>Video is unavailable for this clip.</p>
      <video id="clipPlayerVideo" data-testid="clip-player-video" controls playsinline style="width: 100%; max-height: 70vh; border-radius: var(--r-md); background: #000;"></video>
    </div>
  </div>

  <script src="./js/mockup-api-client.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const shareToken = String(params.get('share') || '').trim();
      const isGuest = Boolean(shareToken);

      const currentUser = isGuest ? null : MockupApi.getCurrentUser();
      document.getElementById('roleMeta').textContent = isGuest
        ? 'Guest View'
        : (currentUser ? currentUser.role : 'Guest');
      if (!isGuest) {
        MockupApi.applyRoleGatedNav(currentUser);
      }

      let contextPlayerId = String(params.get('playerId') || '').trim();
      let contextPlayerName = String(params.get('playerName') || '').trim();
      let contextTeamName = String(params.get('teamName') || '').trim();

      if (isGuest) {
        const dashboard = MockupApi.getDashboardByShareToken(shareToken);
        if (!dashboard || !dashboard.player) {
          const notice = (window.__MOCK_API_LAST_ERROR__ && window.__MOCK_API_LAST_ERROR__.message)
            || 'This share link is not available.';
          document.getElementById('assessmentHeaderMeta').textContent = '0 submitted • 0 assessed';
          document.getElementById('resultsGrid').innerHTML =
            '<div class="notice" data-testid="guest-share-unavailable">' + notice + '</div>';
          document.querySelectorAll('.assessment-toolbar, .filters').forEach(function (el) {
            el.hidden = true;
          });
          document.querySelectorAll('.bottom-nav a.nav-item').forEach(function (el) {
            el.removeAttribute('href');
            el.setAttribute('aria-disabled', 'true');
            el.classList.add('is-inert');
            el.addEventListener('click', function (event) { event.preventDefault(); });
          });
          const exitEarly = document.querySelector('[data-testid="exit-button"]');
          if (exitEarly) {
            exitEarly.disabled = true;
          }
          return;
        }
        contextPlayerId = String(dashboard.player.id || contextPlayerId || '');
        contextPlayerName = String(dashboard.player.name || contextPlayerName || '');
        contextTeamName = String(dashboard.player.teamName || contextTeamName || '');
      }

      const hasPlayerContext = Boolean(contextPlayerId || contextPlayerName);

      const teamFilter = document.getElementById('teamFilter');
      const resultsGrid = document.getElementById('resultsGrid');
      const headerMeta = document.getElementById('assessmentHeaderMeta');
      const filterButtons = Array.from(document.querySelectorAll('.filter-btn'));
      const preselectedLabel = document.getElementById('preselectedPlayerLabel');
      const preselectedCheckbox = document.getElementById('preselectedPlayerFilter');
      const preselectedText = document.getElementById('preselectedPlayerText');
      const clipPlayerModal = document.getElementById('clipPlayerModal');
      const clipPlayerVideo = document.getElementById('clipPlayerVideo');
      const clipPlayerUnavailable = document.getElementById('clipPlayerUnavailable');
      const clipPlayerClose = document.getElementById('clipPlayerClose');
      const clipPlayerTitle = document.getElementById('clipPlayerTitle');
      let selectedStatus = 'all';
      const clipsById = {};

      function makeInert(el) {
        if (!el) {
          return;
        }
        el.setAttribute('aria-disabled', 'true');
        el.classList.add('is-inert');
        if (el.tagName === 'A') {
          el.removeAttribute('href');
          el.addEventListener('click', function (event) {
            event.preventDefault();
          });
        } else if (el.tagName === 'BUTTON' || el.tagName === 'SELECT' || el.tagName === 'INPUT') {
          el.disabled = true;
        }
      }

      function openClipPlayerModal() {
        if (!clipPlayerModal) {
          return;
        }
        clipPlayerModal.classList.add('open');
        clipPlayerModal.setAttribute('aria-hidden', 'false');
      }

      function closeClipPlayerModal() {
        if (!clipPlayerModal) {
          return;
        }
        if (clipPlayerVideo) {
          clipPlayerVideo.pause();
          clipPlayerVideo.removeAttribute('src');
          clipPlayerVideo.load();
        }
        if (clipPlayerUnavailable) {
          clipPlayerUnavailable.hidden = true;
        }
        if (clipPlayerVideo) {
          clipPlayerVideo.hidden = false;
        }
        clipPlayerModal.classList.remove('open');
        clipPlayerModal.setAttribute('aria-hidden', 'true');
      }

      function showClipUnavailable(message) {
        if (clipPlayerUnavailable) {
          clipPlayerUnavailable.textContent = message || 'Video is unavailable for this clip.';
          clipPlayerUnavailable.hidden = false;
        }
        if (clipPlayerVideo) {
          clipPlayerVideo.hidden = true;
          clipPlayerVideo.pause();
          clipPlayerVideo.removeAttribute('src');
          clipPlayerVideo.load();
        }
        openClipPlayerModal();
      }

      function playClip(clip) {
        if (!clip) {
          showClipUnavailable('Video is unavailable for this clip.');
          return;
        }
        if (clipPlayerTitle) {
          clipPlayerTitle.textContent = clip.playerName
            ? ('Clip — ' + clip.playerName)
            : 'Clip playback';
        }
        const resolved = MockupApi.resolveClipMediaSource(clip);
        if (!resolved) {
          showClipUnavailable('Video is unavailable for this clip.');
          return;
        }
        const mediaUrl = isGuest
          ? MockupApi.clipMediaUrlForShare(shareToken, resolved.clipId, resolved.source)
          : MockupApi.clipMediaUrl(resolved.clipId, resolved.source);
        if (clipPlayerUnavailable) {
          clipPlayerUnavailable.hidden = true;
        }
        if (clipPlayerVideo) {
          clipPlayerVideo.hidden = false;
          clipPlayerVideo.onerror = function () {
            if (clipPlayerUnavailable) {
              clipPlayerUnavailable.textContent = 'Video is unavailable for this clip.';
              clipPlayerUnavailable.hidden = false;
            }
          };
          clipPlayerVideo.src = mediaUrl;
          openClipPlayerModal();
          const playPromise = clipPlayerVideo.play();
          if (playPromise && typeof playPromise.catch === 'function') {
            playPromise.catch(function () {});
          }
        } else {
          openClipPlayerModal();
        }
      }

      if (hasPlayerContext || isGuest) {
        preselectedLabel.hidden = false;
        preselectedCheckbox.checked = true;
        preselectedText.textContent = contextPlayerName
          ? 'Pre-Selected Player: ' + contextPlayerName
          : 'Pre-Selected Player';
        if (isGuest) {
          makeInert(preselectedCheckbox);
          makeInert(teamFilter);
        }
      }

      function guestBackHref() {
        const backParams = new URLSearchParams();
        if (shareToken) {
          backParams.set('share', shareToken);
        }
        if (contextPlayerName) {
          backParams.set('player', contextPlayerName);
        }
        const q = backParams.toString();
        return './S2-player-dashboard.html' + (q ? '?' + q : '');
      }

      function statusMatchesFilter(clip, statusFilter) {
        const status = String(clip.status || '');
        if (!statusFilter || statusFilter === 'all') {
          return true;
        }
        if (statusFilter === 'assessed') {
          return status === 'complete' || status === 'assessed';
        }
        if (statusFilter === 'pending') {
          return status === 'submitted' || status === 'in_progress' || status === 'pending';
        }
        if (statusFilter === 'failed') {
          return status === 'failed';
        }
        return status === statusFilter;
      }

      function loadClipsForRender(statusOverride) {
        const status = statusOverride || selectedStatus;
        if (isGuest) {
          return (MockupApi.listClipsByShareToken(shareToken) || []).filter(function (clip) {
            return statusMatchesFilter(clip, status);
          });
        }
        return MockupApi.listClips(buildClipFilters(status));
      }

      function loadClipsForCounts() {
        if (isGuest) {
          return MockupApi.listClipsByShareToken(shareToken) || [];
        }
        return MockupApi.listClips(buildClipFilters('all'));
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function buildCommentMarkup(clip, isComplete, isFailed) {
        const text = clip.comments || (isFailed ? clip.errorMessage : '');
        if (!text) {
          return '';
        }
        const errorClass = isFailed ? ' result-comment--error' : '';
        return '<div class="result-comment' + errorClass + '">' + escapeHtml(text) + '</div>';
      }

      /** Format clip.score as percent. Primary: 0–1 fraction. Legacy: values > 1 treated as 1–5. */
      function formatClipScore(score) {
        if (score == null || score === '' || Number.isNaN(Number(score))) {
          return { label: 'N/A', percent: null, bright: false };
        }
        const n = Number(score);
        const percent = n > 1 ? Math.round((n / 5) * 100) : Math.round(n * 100);
        const clamped = Math.max(0, Math.min(100, percent));
        return { label: clamped + '%', percent: clamped, bright: clamped > 80 };
      }

      function buildScoreMarkup(clip, isComplete, isFailed) {
        if (isComplete) {
          const formatted = formatClipScore(clip.score);
          const starClass = formatted.bright ? 'rating-star' : 'rating-star rating-star--muted';
          return (
            '<div class="result-rating" data-testid="result-rating">' +
            '<span class="' + starClass + '" data-testid="rating-star"' +
            (formatted.bright ? ' data-bright="true"' : ' data-bright="false"') +
            '>★</span>' +
            '<span data-testid="rating-label">' + escapeHtml(formatted.label) + '</span>' +
            '</div>'
          );
        }
        if (isFailed) {
          return '';
        }
        return (
          '<div style="margin-top: 0.6rem; color: var(--text-muted); font-size: 0.85rem;">' +
          (clip.status === 'in_progress' ? 'Assessment in progress…' : 'Awaiting assessment…') +
          '</div>'
        );
      }

      function assessmentSkills(clip) {
        const focus = Array.isArray(clip.skillFocus) ? clip.skillFocus : [];
        const rated = clip.skillRatings && typeof clip.skillRatings === 'object' && !Array.isArray(clip.skillRatings)
          ? Object.keys(clip.skillRatings)
          : [];
        const seen = {};
        const ordered = [];
        focus.concat(rated).forEach(function (name) {
          const key = String(name || '').trim();
          if (!key || seen[key]) {
            return;
          }
          seen[key] = true;
          ordered.push(key);
        });
        return ordered;
      }

      const skillAbbrByName = (function () {
        const map = {};
        const catalog = MockupApi.listSkills(
          currentUser && currentUser.role,
          currentUser && currentUser.email,
          'all'
        ) || [];
        catalog.forEach(function (skill) {
          if (!skill || !skill.name) return;
          const key = String(skill.name).trim().toLowerCase();
          const abbr = skill.abbreviation || (MockupApi.suggestSkillAbbreviation && MockupApi.suggestSkillAbbreviation(skill.name));
          if (key && abbr) {
            map[key] = abbr;
          }
        });
        return map;
      })();

      function skillDisplayLabel(skillName) {
        const key = String(skillName || '').trim().toLowerCase();
        return (key && skillAbbrByName[key]) || skillName;
      }

      function buildSkillListMarkup(clip, isComplete) {
        if (!isComplete) {
          return '';
        }
        const skills = assessmentSkills(clip);
        if (!skills.length) {
          return '';
        }
        const ratings = clip.skillRatings && typeof clip.skillRatings === 'object' ? clip.skillRatings : {};
        const rows = skills.map(function (skillName) {
          const value = Object.prototype.hasOwnProperty.call(ratings, skillName) ? ratings[skillName] : null;
          const formatted = formatClipScore(value);
          const label = skillDisplayLabel(skillName);
          return (
            '<li class="result-skill-row" data-testid="result-skill-row">' +
            '<span class="result-skill-name" title="' + escapeHtml(skillName) + '">' + escapeHtml(label) + '</span>' +
            '<span class="result-skill-value" data-testid="result-skill-value">' + escapeHtml(formatted.label) + '</span>' +
            '</li>'
          );
        }).join('');
        return '<ul class="result-skills" data-testid="result-skills">' + rows + '</ul>';
      }

      function buildClipFilters(statusOverride) {
        const filters = {
          teamName: teamFilter.value || 'all',
          status: statusOverride || selectedStatus
        };
        if (currentUser && currentUser.email) {
          filters.actorEmail = currentUser.email;
        }
        if (hasPlayerContext && preselectedCheckbox.checked) {
          if (contextPlayerId) {
            filters.playerId = contextPlayerId;
          } else if (contextPlayerName) {
            filters.playerName = contextPlayerName;
          }
        }
        return filters;
      }

      function render() {
        const clips = loadClipsForRender(selectedStatus);
        const countClips = loadClipsForCounts();
        const assessedCount = countClips.filter(function (clip) {
          return clip.status === 'complete' || clip.status === 'assessed';
        }).length;
        headerMeta.textContent = countClips.length + ' submitted • ' + assessedCount + ' assessed';

        resultsGrid.innerHTML = '';
        Object.keys(clipsById).forEach(function (key) { delete clipsById[key]; });
        if (!clips.length) {
          resultsGrid.innerHTML = '<div class="notice">No clips match the selected filters.</div>';
          return;
        }

        const canEditClips =
          !isGuest &&
          currentUser &&
          (currentUser.role === 'Coach' ||
            currentUser.role === 'ClubAdmin' ||
            currentUser.role === 'SystemAdmin');

        clips.forEach(function (clip) {
          clipsById[String(clip.id)] = clip;
          const isComplete = clip.status === 'complete' || clip.status === 'assessed';
          const isPending = clip.status === 'submitted' || clip.status === 'in_progress' || clip.status === 'pending';
          const isFailed = clip.status === 'failed';
          const statusClass = isComplete ? 'status-assessed' : isPending ? 'status-pending' : 'status-failed';
          const statusLabel = clip.status === 'in_progress' ? 'in progress' : clip.status;
          const sourceUrl = String(clip.sourceUrl || '').trim();
          const mediaPath = String(clip.path || '').trim();
          const isReprocessEligible =
            (isFailed || isComplete) && Boolean(mediaPath || sourceUrl);
          const openOriginal = sourceUrl
            ? '<a class="view-btn view-btn--secondary" data-testid="open-original-link" href="' +
              escapeHtml(sourceUrl) +
              '" target="_blank" rel="noopener noreferrer">Open original</a>'
            : '';
          const reprocessButton =
            canEditClips && isReprocessEligible
              ? '<button type="button" class="view-btn" data-testid="reprocess-clip" data-clip-id="' +
                escapeHtml(clip.id) +
                '">Re-process</button>'
              : '';
          const deleteButton = canEditClips
            ? '<button type="button" class="view-btn view-btn--danger" data-testid="delete-clip" data-clip-id="' +
              escapeHtml(clip.id) +
              '">Delete</button>'
            : '';
          let primaryAction = '';
          if (isPending) {
            primaryAction = '<button class="view-btn" disabled>Pending</button>' + deleteButton;
          } else if (isFailed) {
            primaryAction =
              (reprocessButton || '<button class="view-btn" disabled>Failed</button>') + deleteButton;
          } else if (isGuest) {
            primaryAction =
              '<a class="view-btn" data-testid="back-link" href="' + escapeHtml(guestBackHref()) + '">Back</a>';
          } else {
            primaryAction =
              '<a class="view-btn" data-testid="back-link" href="./S2-player-dashboard.html?player=' +
              encodeURIComponent(clip.playerName) +
              '">Back</a>' +
              reprocessButton +
              deleteButton;
          }
          const actions =
            '<div class="result-actions">' + openOriginal + primaryAction + '</div>';
          const scoreMarkup = buildScoreMarkup(clip, isComplete, isFailed);
          const skillListMarkup = buildSkillListMarkup(clip, isComplete);
          const commentMarkup = buildCommentMarkup(clip, isComplete, isFailed);

          const card = document.createElement('div');
          card.className = 'result-card';
          const thumbUrl = isGuest
            ? MockupApi.clipThumbnailUrlForShare(shareToken, clip.id)
            : MockupApi.clipThumbnailUrl(clip.id);
          card.innerHTML =
            '<div class="result-thumbnail">' +
            '<span class="result-thumbnail-fallback" aria-hidden="true">📹</span>' +
            '<img class="result-thumbnail-img" data-testid="clip-thumbnail" alt="" src="' +
            escapeHtml(thumbUrl) +
            '" onerror="this.remove()">' +
            '<button type="button" class="play-icon" data-testid="clip-play-button" data-clip-id="' +
            escapeHtml(clip.id) +
            '" aria-label="Play clip">▶</button>' +
            '</div>' +
            '<div class="result-content">' +
            '<div>' +
            '<div class="result-header">' +
            '<div><div class="result-player">' + escapeHtml(clip.playerName) + '</div><div class="result-situation">' + escapeHtml(clip.situation) + '</div></div>' +
            '<span class="status-badge ' + statusClass + '">' + statusLabel + '</span>' +
            '</div>' +
            '<div class="result-meta"><span>' + escapeHtml(clip.submittedAt) + '</span><span>' + escapeHtml(clip.skill) + '</span><span>' + escapeHtml(clip.teamName) + '</span></div>' +
            commentMarkup +
            scoreMarkup +
            skillListMarkup +
            '</div>' +
            actions +
            '</div>';

          resultsGrid.appendChild(card);
        });
      }

      if (!isGuest) {
        const isClubScoped =
          currentUser &&
          (currentUser.role === 'Coach' || currentUser.role === 'ClubAdmin');
        const teamQuery = currentUser && currentUser.email && isClubScoped
          ? 'actorEmail=' + encodeURIComponent(currentUser.email) + '&status=active'
          : 'status=active';
        MockupApi.listTeams(teamQuery).forEach(function (team) {
          const option = document.createElement('option');
          option.value = team.name;
          option.textContent = team.name;
          teamFilter.appendChild(option);
        });

        if (contextTeamName) {
          const hasTeam = Array.from(teamFilter.options).some(function (option) {
            return option.value === contextTeamName;
          });
          if (hasTeam) {
            teamFilter.value = contextTeamName;
          }
        }

        teamFilter.addEventListener('change', render);
        preselectedCheckbox.addEventListener('change', render);
      } else if (contextTeamName) {
        teamFilter.innerHTML = '';
        const option = document.createElement('option');
        option.value = contextTeamName;
        option.textContent = contextTeamName;
        teamFilter.appendChild(option);
        teamFilter.value = contextTeamName;
      }

      filterButtons.forEach(function (button) {
        button.addEventListener('click', function () {
          filterButtons.forEach(function (entry) { entry.classList.remove('active'); });
          button.classList.add('active');
          selectedStatus = button.getAttribute('data-status') || 'all';
          render();
        });
      });

      resultsGrid.addEventListener('click', function (event) {
        const deleteButton = event.target.closest('[data-testid="delete-clip"]');
        if (deleteButton) {
          event.preventDefault();
          event.stopPropagation();
          const clipId = deleteButton.getAttribute('data-clip-id');
          if (!window.confirm('Delete this video assessment? This cannot be undone.')) {
            return;
          }
          const actorEmail = currentUser && currentUser.email ? currentUser.email : '';
          deleteButton.disabled = true;
          const result = MockupApi.deleteClip(clipId, { actorEmail: actorEmail });
          if (!result || (result.status !== 204 && (result.status < 200 || result.status >= 300))) {
            deleteButton.disabled = false;
            window.alert((result && result.message) || 'Delete failed. Please try again.');
            return;
          }
          render();
          return;
        }

        const reprocessButton = event.target.closest('[data-testid="reprocess-clip"]');
        if (reprocessButton) {
          event.preventDefault();
          event.stopPropagation();
          const clipId = reprocessButton.getAttribute('data-clip-id');
          const actorEmail = currentUser && currentUser.email ? currentUser.email : '';
          reprocessButton.disabled = true;
          const result = MockupApi.reprocessClip(clipId, { actorEmail: actorEmail });
          if (!result || result.status < 200 || result.status >= 300) {
            reprocessButton.disabled = false;
            window.alert((result && result.message) || 'Re-process failed. Please try again.');
            return;
          }
          render();
          return;
        }

        const playButton = event.target.closest('[data-testid="clip-play-button"]');
        if (!playButton) {
          return;
        }
        event.preventDefault();
        event.stopPropagation();
        const clipId = playButton.getAttribute('data-clip-id');
        playClip(clipsById[String(clipId)]);
      });

      if (clipPlayerClose) {
        clipPlayerClose.addEventListener('click', closeClipPlayerModal);
      }
      if (clipPlayerModal) {
        clipPlayerModal.addEventListener('click', function (event) {
          if (event.target === clipPlayerModal) {
            closeClipPlayerModal();
          }
        });
      }
      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape' && clipPlayerModal && clipPlayerModal.classList.contains('open')) {
          closeClipPlayerModal();
        }
      });

      if (isGuest) {
        document.querySelectorAll('.bottom-nav a.nav-item').forEach(makeInert);
      }

      render();

      const exitButton = document.querySelector('[data-testid="exit-button"]');
      if (exitButton && !isGuest) {
        exitButton.addEventListener('click', () => {
          MockupApi.logout();
          window.location.href = './S0-login.html';
        });
      } else if (exitButton && isGuest) {
        makeInert(exitButton);
      }
    })();
  </script>
