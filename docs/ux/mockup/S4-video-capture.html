<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>S4: Video Capture / Upload — VantageIQ</title>
  <link rel="stylesheet" href="./style/site.css">
</head>
<body>
  <div class="container">
    <header>
      <a class="back-btn" href="./S1-player-list.html">←</a>
      <div class="header-title">Submit a Clip</div>
      <div class="header-meta" id="roleMeta">Coach</div>
      <button class="exit-btn" type="button" data-testid="exit-button" aria-label="Log out" title="Log out">✕</button>
    </header>

    <div class="content">
      <div class="form-wrapper">
        <div class="toolbar" style="margin-bottom: 1rem;">
          <select id="teamSelect" class="pill-select" aria-label="Selected team for clip" data-testid="team-select">
            <option value="all">Team: All</option>
          </select>
        </div>

        <form id="clipForm">
          <!-- Video Input Section -->
          <div class="form-section">
            <label class="form-label">Video Clip <span class="required">*</span></label>
            <div class="video-input-section">
              <button type="button" class="input-btn" onclick="alert('Camera capture would open on mobile')">
                <span class="input-icon">📷</span>
                <span>Record a Clip</span>
              </button>
              <button type="button" class="input-btn" onclick="document.getElementById('fileInput').click()">
                <span class="input-icon">📂</span>
                <span>Upload File</span>
              </button>
            </div>
            <input type="file" id="fileInput" class="file-input" accept="video/mp4,video/quicktime" onchange="updatePreview()">
            <div class="video-preview" id="videoPreview">No video selected</div>
            <div class="validation-hint">MP4 or MOV • Max 50MB • Max 60 seconds</div>
          </div>

          <!-- Player Selector -->
          <div class="form-section">
            <label class="form-label" for="player">Player <span class="required">*</span></label>
            <select id="player" required>
              <option value="">Select a player…</option>
            </select>
            <div class="error-msg" id="playerError">Player is required</div>
          </div>

          <!-- Situation Description -->
          <div class="form-section">
            <label class="form-label" for="situation">Situation <span class="required">*</span></label>
            <textarea id="situation" placeholder="Describe the moment (e.g. penalty kick attempt, counter-attack opportunity, one-on-one with goalkeeper)" required></textarea>
            <div class="validation-hint">Max 200 characters</div>
            <div class="error-msg" id="situationError">Situation is required</div>
          </div>

          <!-- Skill Focus (Optional) -->
          <div class="form-section">
            <label class="form-label">Skill Focus (Optional)</label>
            <div class="checkbox-group">
              <label class="checkbox-label">
                <input type="checkbox" name="skill" value="decision">
                <span>Decision-making</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="skill" value="technical">
                <span>Technical Skill</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="skill" value="positioning">
                <span>Positioning</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="skill" value="pace">
                <span>Pace &amp; Agility</span>
              </label>
            </div>
          </div>

          <!-- Action Buttons -->
          <div class="form-buttons">
            <button type="button" class="btn btn-secondary" onclick="handleCancel()">Cancel</button>
            <button type="submit" class="btn btn-primary">Submit for Assessment</button>
          </div>
        </form>
      </div>
    </div>

    <nav class="bottom-nav">
      <a class="nav-item" href="./S1-player-list.html">
        <span class="nav-icon">👥</span>
        <span>Players</span>
      </a>
      <a class="nav-item" href="./S3-team-management.html">
        <span class="nav-icon">🧩</span>
        <span>Teams</span>
      </a>
      <a class="nav-item active" href="./S4-video-capture.html">
        <span class="nav-icon">📹</span>
        <span>Capture</span>
      </a>
      <a class="nav-item" href="./S6-assessment-list.html">
        <span class="nav-icon">📊</span>
        <span>My Clips</span>
      </a>
      <a class="nav-item" href="./S7a-clubs.html" data-role-visible-to="SystemAdmin" data-testid="nav-clubs" hidden>
        <span class="nav-icon">🏛️</span>
        <span>Clubs</span>
      </a>
      <a class="nav-item" href="./S8-skills.html" data-role-visible-to="SystemAdmin" data-testid="nav-skills" hidden>
        <span class="nav-icon">🧠</span>
        <span>Skills</span>
      </a>
    </nav>
  </div>

  <script src="./js/mockup-api-client.js"></script>

  <script>
    function updatePreview() {
      const fileInput = document.getElementById('fileInput');
      const preview = document.getElementById('videoPreview');
      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        preview.textContent = `✓ ${file.name} (${(file.size / 1024 / 1024).toFixed(2)}MB)`;
        preview.classList.add('active');
      }
    }

    function handleCancel() {
      if (confirm('Discard this clip?')) {
        window.history.back();
      }
    }

    document.getElementById('clipForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const player = document.getElementById('player').value;
      const situation = document.getElementById('situation').value;

      let valid = true;
      if (!player) {
        document.getElementById('playerError').classList.add('show');
        valid = false;
      } else {
        document.getElementById('playerError').classList.remove('show');
      }

      if (!situation) {
        document.getElementById('situationError').classList.add('show');
        valid = false;
      } else {
        document.getElementById('situationError').classList.remove('show');
      }

      if (valid) {
        const selectedPlayer = document.getElementById('player').options[document.getElementById('player').selectedIndex].text;
        const skill = document.querySelector('input[name="skill"]:checked');
        const response = MockupApi.submitClip({
          playerName: selectedPlayer,
          situation,
          skill: skill ? skill.nextElementSibling.textContent : 'General'
        });

        if (response.status >= 400) {
          alert(response.message);
          return;
        }

        alert(response.message);
        document.getElementById('clipForm').reset();
        document.getElementById('videoPreview').textContent = 'No video selected';
        document.getElementById('videoPreview').classList.remove('active');
      }
    });

    function getAvailableTeamsForActor(currentUser) {
      const allTeams = MockupApi.listTeams() || [];
      if (!currentUser || currentUser.status !== 'active') {
        return allTeams;
      }
      if (currentUser.role === 'SystemAdmin') {
        return allTeams;
      }
      if (currentUser.role === 'Coach') {
        const actorEmail = String(currentUser.email || '').trim().toLowerCase();
        const actorName = String(currentUser.name || '').trim().toLowerCase();
        return allTeams.filter(function (team) {
          const teamCoachEmail = String(team.leadCoachEmail || '').trim().toLowerCase();
          const teamCoachName = String(team.leadCoach || '').trim().toLowerCase();
          if (actorEmail && teamCoachEmail && teamCoachEmail === actorEmail) {
            return true;
          }
          if (actorName && teamCoachName && teamCoachName === actorName) {
            return true;
          }
          return false;
        });
      }
      return allTeams;
    }

    function populateTeamSelect(teamSelect, teams, selectedTeam) {
      teamSelect.innerHTML = '';
      const allOption = document.createElement('option');
      allOption.value = 'all';
      allOption.textContent = 'Team: All';
      teamSelect.appendChild(allOption);
      teams.forEach(function (team) {
        const option = document.createElement('option');
        option.value = String(team.name);
        option.textContent = 'Team: ' + team.name;
        teamSelect.appendChild(option);
      });
      if (selectedTeam && selectedTeam !== 'all') {
        const match = Array.from(teamSelect.options).find(function (o) { return o.value === selectedTeam; });
        teamSelect.value = match ? selectedTeam : 'all';
      } else {
        teamSelect.value = 'all';
      }
    }

    function populatePlayerSelect(playerSelect, players) {
      playerSelect.innerHTML = '';
      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = 'Select a player…';
      playerSelect.appendChild(placeholder);
      players.forEach(function (player) {
        const option = document.createElement('option');
        option.value = String(player.id);
        option.textContent = player.name;
        option.dataset.teamName = String(player.teamName || '');
        playerSelect.appendChild(option);
      });
    }

    (function () {
      const currentUser = MockupApi.getCurrentUser();
      document.getElementById('roleMeta').textContent = currentUser ? currentUser.role : 'Guest';
      MockupApi.applyRoleGatedNav(currentUser);

      const actorEmail = currentUser && currentUser.email
        ? String(currentUser.email).trim().toLowerCase()
        : '';
      const isCoach = Boolean(
        currentUser &&
        currentUser.role === 'Coach' &&
        currentUser.status === 'active'
      );
      const state = {
        actorEmail: actorEmail,
        onlyMine: isCoach,
        selectedTeam: 'all'
      };

      const teamSelect = document.getElementById('teamSelect');
      const playerSelect = document.getElementById('player');

      function refreshPlayers() {
        const players = MockupApi.listPlayers({
          teamName: state.selectedTeam,
          actorEmail: state.actorEmail,
          onlyMine: state.onlyMine
        });
        populatePlayerSelect(playerSelect, players);
      }

      const availableTeams = getAvailableTeamsForActor(currentUser);
      populateTeamSelect(teamSelect, availableTeams, state.selectedTeam);

      teamSelect.addEventListener('change', function () {
        state.selectedTeam = teamSelect.value;
        refreshPlayers();
      });

      refreshPlayers();

      const exitButton = document.querySelector('[data-testid="exit-button"]');
      if (exitButton) {
        exitButton.addEventListener('click', () => {
          MockupApi.logout();
          window.location.href = './S0-login.html';
        });
      }
    })();
  </script>
</body>
</html>
