<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>S0: Login — VantageIQ</title>
  <link rel="stylesheet" href="./style/site.css">
</head>
<body>
  <div class="auth-shell">
    <main class="auth-card">
      <div class="auth-logo">
        <img class="brand-logo" src="/data/img/VantagIQ_transp_300_2.png" alt="VantageIQ" data-testid="brand-logo">
      </div>
      <p class="auth-subtitle">LOGIN</p>

      <form class="auth-form" id="loginForm">
        <div>
          <label class="form-label" for="email">Email</label>
          <input id="email" type="text" placeholder="coach@vantageiq.club">
        </div>

        <div>
          <label class="form-label" for="password">Password</label>
          <input id="password" type="password" placeholder="Enter password">
        </div>

        <button class="btn btn-primary" type="submit">Sign In</button>
      </form>

      <p class="error-msg" id="loginError" style="margin-top:0.7rem;">You do not have permission to perform this action.</p>

      <div class="notice" style="margin-top: 1rem;">
        Forgot password? Contact your administrator to reset it.
      </div>
    </main>
  </div>

  <script src="./js/mockup-api-client.js"></script>
  <script>
    (function () {
      const form = document.getElementById('loginForm');
      const loginError = document.getElementById('loginError');

      form.addEventListener('submit', function (event) {
        event.preventDefault();
        loginError.classList.remove('show');

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const response = MockupApi.login(email, password);

        if (response.status !== 200) {
          loginError.textContent = response.message;
          loginError.classList.add('show');
          return;
        }

        MockupApi.continueAfterLogin(response.user);
      });
    })();
  </script>
</body>
</html>
