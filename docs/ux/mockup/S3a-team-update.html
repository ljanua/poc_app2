<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>S3a: Update Team — VantageIQ</title>
  <link rel="stylesheet" href="./style/site.css">
</head>
<body>
  <div class="container">
    <header>
      <a class="back-btn" href="./S3-team-management.html">←</a>
      <div class="header-title" id="pageTitle">Update Team</div>
      <div class="role-badge" id="roleBadge">Coach</div>
      <button class="exit-btn" type="button" data-testid="exit-button" aria-label="Log out" title="Log out">✕</button>
    </header>

    <div class="content">
      <div class="notice" id="missingNotice" hidden data-testid="missing-notice">
        No team selected. Return to <a href="./S3-team-management.html">Team Management</a> to pick a team.
      </div>

      <section class="form-card" id="updateCard" aria-labelledby="updateHeading" hidden>
        <h2 id="updateHeading" class="card-heading">Edit</h2>
        <form id="updateTeamForm" class="modal-form">
          <label class="form-label" for="updateNameInput">Team Name <span class="required">*</span></label>
          <input id="updateNameInput" type="text" data-testid="update-name-input" required>

          <label class="form-label" for="updateAgeGroupInput">Age Group <span class="required">*</span></label>
          <input id="updateAgeGroupInput" type="text" data-testid="update-age-group-input" required>

          <label class="form-label" for="updateCoachSelect">Lead Coach <span class="required">*</span></label>
          <select id="updateCoachSelect" data-testid="update-coach-select" required></select>

          <label class="form-label" for="updateClubSelect">Club <span class="required">*</span></label>
          <select id="updateClubSelect" data-testid="update-club-select" required></select>

          <label class="form-label" for="updateStatusSelect">Status <span class="required">*</span></label>
          <select id="updateStatusSelect" data-testid="update-status-select" required>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>

          <label class="form-label" for="updateSportSelect">Sport <span class="required">*</span></label>
          <select id="updateSportSelect" data-testid="update-sport-select" required></select>

          <p id="updateFormError" class="error-msg">Please review the form fields and try again.</p>

          <div class="inline-actions">
            <button class="btn btn-primary" type="submit" data-testid="update-save">Save Changes</button>
            <button class="btn btn-secondary" type="button" id="cancelUpdate" data-testid="update-cancel">Cancel</button>
          </div>
        </form>
      </section>
    </div>

    <nav class="bottom-nav">
      <a class="nav-item" href="./S1-player-list.html">
        <span class="nav-icon">👥</span>
        <span>Players</span>
      </a>
      <a class="nav-item" href="./S3-team-management.html">
        <span class="nav-icon">🧩</span>
        <span>Teams</span>
      </a>
      <a class="nav-item" href="./S4-video-capture.html" data-role-visible-to="Coach,ClubAdmin" hidden>
        <span class="nav-icon">📹</span>
        <span>Capture</span>
      </a>
      <a class="nav-item" href="./S6-assessment-list.html" data-role-visible-to="Coach,ClubAdmin" hidden>
        <span class="nav-icon">📊</span>
        <span>My Clips</span>
      </a>
      <a class="nav-item" href="./S7-admin-user-management.html" data-role-visible-to="SystemAdmin,ClubAdmin" data-testid="nav-users" hidden>
        <span class="nav-icon">🛡️</span>
        <span>Users</span>
      </a>
      <a class="nav-item" href="./S7a-clubs.html" data-role-visible-to="SystemAdmin" data-testid="nav-clubs" hidden>
        <span class="nav-icon">🏛️</span>
        <span>Clubs</span>
      </a>
      <a class="nav-item" href="./S8-skills.html?tab=sports" data-role-visible-to="SystemAdmin,ClubAdmin,Coach" data-testid="nav-sports" hidden>
        <span class="nav-icon">⚽</span>
        <span>Sports</span>
      </a>
      <a class="nav-item" href="./S8-skills.html" data-role-visible-to="SystemAdmin,ClubAdmin,Coach" data-testid="nav-skills" hidden>
        <span class="nav-icon">🧠</span>
        <span>Skills</span>
      </a>
    </nav>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="./js/mockup-api-client.js"></script>
  <script>
    window.__USE_BACKEND__ = window.__USE_BACKEND__ !== false;

    (function () {
      const roleBadge = document.getElementById('roleBadge');
      const updateCard = document.getElementById('updateCard');
      const missingNotice = document.getElementById('missingNotice');
      const updateForm = document.getElementById('updateTeamForm');
      const updateNameInput = document.getElementById('updateNameInput');
      const updateAgeGroupInput = document.getElementById('updateAgeGroupInput');
      const updateCoachSelect = document.getElementById('updateCoachSelect');
      const updateClubSelect = document.getElementById('updateClubSelect');
      const updateStatusSelect = document.getElementById('updateStatusSelect');
      const updateSportSelect = document.getElementById('updateSportSelect');
      const updateFormError = document.getElementById('updateFormError');
      const cancelUpdate = document.getElementById('cancelUpdate');
      const toast = document.getElementById('toast');
      const pageTitle = document.getElementById('pageTitle');

      const state = {
        teamId: null,
        team: null,
        actorRole: 'Coach',
        actorEmail: null,
        availableClubs: []
      };

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(function () {
          toast.classList.remove('show');
        }, 2400);
      }

      function showError(target, message) {
        target.textContent = message || 'Please review the form fields and try again.';
        target.classList.add('show');
      }

      function hideError(target) {
        target.classList.remove('show');
      }

      function getQueryTeamId() {
        const params = new URLSearchParams(window.location.search);
        return params.get('teamId');
      }

      function getSessionUser() {
        if (window.MockupApi && typeof window.MockupApi.getCurrentUser === 'function') {
          return window.MockupApi.getCurrentUser();
        }
        const sessionEmail = window.localStorage.getItem('vantageiq_current_user_email');
        if (!sessionEmail) return null;
        return { email: sessionEmail };
      }

      function fillCoachSelect(selectEl, currentCoachEmail) {
        const coaches = (window.MockupApi && window.MockupApi.listActiveCoaches) ? window.MockupApi.listActiveCoaches() : [];
        selectEl.innerHTML = '';
        coaches.forEach(function (coach) {
          const option = document.createElement('option');
          option.value = coach.email;
          option.textContent = coach.name + ' (' + coach.email + ')';
          if (coach.email.toLowerCase() === String(currentCoachEmail || '').toLowerCase()) {
            option.selected = true;
          }
          selectEl.appendChild(option);
        });
      }

      function fillClubSelect(selectEl, clubs, currentClubId) {
        selectEl.innerHTML = '';
        clubs.forEach(function (club) {
          const option = document.createElement('option');
          option.value = club.id;
          option.textContent = club.name;
          if (club.id === currentClubId) {
            option.selected = true;
          }
          selectEl.appendChild(option);
        });
      }

      function fillSportSelect(selectEl, currentSportId) {
        const sports = (window.MockupApi && window.MockupApi.listSports) ? window.MockupApi.listSports(state.actorRole, state.actorEmail, 'active') : [];
        selectEl.innerHTML = '';
        const fallback = (sports || []).slice();
        if (!fallback.some(function (sport) { return sport.id === 'sport_soccer'; })) {
          fallback.push({ id: 'sport_soccer', name: 'Soccer' });
        }
        fallback.forEach(function (sport) {
          const option = document.createElement('option');
          option.value = sport.id;
          option.textContent = sport.name;
          if (sport.id === currentSportId) {
            option.selected = true;
          }
          selectEl.appendChild(option);
        });
        if (currentSportId && Array.from(selectEl.options).some(function (opt) { return opt.value === currentSportId; })) {
          selectEl.value = currentSportId;
        } else {
          selectEl.value = 'sport_soccer';
        }
      }

      function init() {
        const sessionUser = getSessionUser();
        if (!sessionUser || !sessionUser.email) {
          window.location.href = './S0-login.html';
          return;
        }
        state.actorEmail = sessionUser.email;
        state.actorRole = sessionUser.role || 'Coach';
        roleBadge.textContent = state.actorRole;

        MockupApi.applyRoleGatedNav(sessionUser);

        const teamId = getQueryTeamId();
        if (!teamId) {
          missingNotice.hidden = false;
          return;
        }
        state.teamId = teamId;

        state.team = MockupApi.getTeamById(teamId);
        if (!state.team) {
          missingNotice.hidden = false;
          return;
        }

        state.availableClubs = MockupApi.listClubs(state.actorRole, state.actorEmail) || [];
        const visibleClubIds = new Set(state.availableClubs.map(function (c) { return c.id; }));

        pageTitle.textContent = 'Update ' + state.team.name;

        updateNameInput.value = state.team.name || '';
        updateAgeGroupInput.value = state.team.ageGroup || '';
        fillCoachSelect(updateCoachSelect, state.team.leadCoachEmail);
        const clubsForForm = visibleClubIds.has(state.team.clubId)
          ? state.availableClubs
          : state.availableClubs.concat([{ id: state.team.clubId, name: state.team.clubName || '(unknown club)' }]);
        fillClubSelect(updateClubSelect, clubsForForm, state.team.clubId);
        updateStatusSelect.value = state.team.status || 'active';
        fillSportSelect(updateSportSelect, state.team.sportId || 'sport_soccer');
        updateCard.hidden = false;
      }

      cancelUpdate.addEventListener('click', function () {
        window.location.href = './S3-team-management.html';
      });

      updateForm.addEventListener('submit', function (event) {
        event.preventDefault();
        hideError(updateFormError);

        const response = MockupApi.updateTeamCoachAndClub(state.teamId, {
          name: updateNameInput.value,
          ageGroup: updateAgeGroupInput.value,
          coachEmail: updateCoachSelect.value,
          clubId: updateClubSelect.value,
          status: updateStatusSelect.value,
          sportId: updateSportSelect.value,
          actorRole: state.actorRole,
          actorEmail: state.actorEmail
        });

        if (response.status === 200) {
          const savedName = (response.team && response.team.name) || updateNameInput.value || state.team.name;
          window.localStorage.setItem('vantageiq_toast', savedName + ' updated.');
          window.location.href = './S3-team-management.html';
          return;
        }

        showError(updateFormError, (response && response.message) || 'Update failed. Please try again.');
      });

      init();
    })();
  </script>
</body>
</html>
